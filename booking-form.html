<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booking Form - Suntop Dental Clinic</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; color:#222; padding:24px; }
    .container { max-width:700px; margin:0 auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 6px 18px rgba(20,30,60,0.08); }
    h1 { margin-top:0; }
    label { display:block; margin-top:12px; font-weight:600; }
    input[type=text], input[type=email], input[type=tel], input[type=date], input[type=time], select, textarea {
      width:100%; padding:10px; margin-top:6px; border:1px solid #d6dcef; border-radius:6px; box-sizing:border-box;
    }
    .row { display:flex; gap:12px; }
    .row .col { flex:1; }
    button { margin-top:16px; padding:10px 16px; background:#0b63ff; color:#fff; border:none; border-radius:6px; cursor:pointer; }
    button.secondary { background:#25D366; } /* WhatsApp green */
    button:disabled { opacity:.6; cursor:not-allowed; }
    .success, .error, .info { margin-top:12px; padding:10px; border-radius:6px; }
    .success { background:#e6f8ee; color:#0b6b36; }
    .error { background:#ffecec; color:#9b1c1c; }
    .info { background:#eef6ff; color:#054ea6; }
    small.note { color:#556; display:block; margin-top:6px; }
    .inline { display:inline-block; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Book an Appointment</h1>
    <p>Please fill out this form to request an appointment at Suntop Dental Clinic.</p>

    <form id="bookingForm">
      <label for="fullname">Full name</label>
      <input id="fullname" name="fullname" type="text" placeholder="Jane Doe" required />

      <div class="row">
        <div class="col">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="col">
          <label for="phone">Phone (WhatsApp)</label>
          <input id="phone" name="phone" type="tel" placeholder="+234 800 000 0000" required />
        </div>
      </div>

      <label for="treatment">Treatment</label>
      <select id="treatment" name="treatment" required>
        <option value="">-- Choose a treatment --</option>
        <option>Consultation</option>
        <option>Cleaning / Scaling</option>
        <option>Filling (Composite/Amalgam)</option>
        <option>Tooth Extraction</option>
        <option>Root Canal Treatment (Endodontics)</option>
        <option>Orthodontics (Braces)</option>
        <option>Teeth Whitening</option>
        <option>Crown / Bridge</option>
        <option>Denture</option>
        <option>Implant Consultation</option>
      </select>

      <label for="branch">Clinic Branch</label>
      <select id="branch" name="branch" required>
        <option value="">-- Choose a branch --</option>
        <option value="uselu">Uselu</option>
        <option value="mm">MM</option>
      </select>
      <small class="note">Branches: Uselu, MM. If you need a different branch, choose Uselu and specify details in the notes.</small>

      <div class="row">
        <div class="col">
          <label for="date">Preferred date</label>
          <input id="date" name="date" type="date" required />
        </div>
        <div class="col">
          <label for="time">Preferred time</label>
          <input id="time" name="time" type="time" />
        </div>
      </div>

      <label for="notes">Notes / Additional information</label>
      <textarea id="notes" name="notes" rows="4" placeholder="Any relevant details (allergies, previous treatment, etc.)"></textarea>

      <label class="inline" for="emailReminder"><input id="emailReminder" name="emailReminder" type="checkbox" /> I want an optional email reminder for my appointment</label>
      <div id="reminderOptions" style="display:none; margin-top:8px;">
        <label for="reminderTiming">Reminder timing</label>
        <select id="reminderTiming" name="reminderTiming">
          <option value="1_day">1 day before</option>
          <option value="12_hours">12 hours before</option>
          <option value="2_hours">2 hours before</option>
        </select>
        <small class="note">We will send a one-time email reminder at the selected time before the appointment.</small>
      </div>

      <div style="margin-top:12px;">
        <button id="submitBtn" type="submit">Request Booking</button>
        <button id="waBtn" type="button" class="secondary" style="margin-left:8px;">Contact Branch on WhatsApp</button>
      </div>

      <div id="message"></div>
      <div id="waInfo" style="margin-top:12px;"></div>
    </form>

    <script>
      // Configure branch WhatsApp numbers here (E.164 without +, e.g. 2348012345678)
      const branchWhatsApp = {
        uselu: '2349125890508', // Uselu clinic WhatsApp number (country code + number, no +)
        mm: '2349169058409'    // MM clinic WhatsApp number
      };

      const form = document.getElementById('bookingForm');
      const messageDiv = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');
      const waBtn = document.getElementById('waBtn');
      const branchSelect = document.getElementById('branch');
      const waInfo = document.getElementById('waInfo');
      const emailReminder = document.getElementById('emailReminder');
      const reminderOptions = document.getElementById('reminderOptions');

      function showMessage(text, type) {
        messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      }

      function formatWhatsAppLink(number, text) {
        if (!number) return null;
        const encoded = encodeURIComponent(text);
        return `https://wa.me/${number}?text=${encoded}`;
      }

      function updateWhatsAppInfo() {
        const branch = branchSelect.value;
        const number = branch ? branchWhatsApp[branch] : null;
        if (number) {
          waInfo.innerHTML = `<div class="info">Branch WhatsApp: <strong>+${number}</strong></div>`;
          waBtn.disabled = false;
        } else {
          waInfo.innerHTML = '';
          waBtn.disabled = true;
        }
      }

      branchSelect.addEventListener('change', updateWhatsAppInfo);
      updateWhatsAppInfo();

      waBtn.addEventListener('click', () => {
        const branch = branchSelect.value;
        const number = branch ? branchWhatsApp[branch] : null;
        if (!number) {
          showMessage('Please select a branch to contact on WhatsApp.', 'error');
          return;
        }
        const name = form.fullname.value.trim() || 'Patient';
        const treatment = form.treatment.value || 'appointment';
        const date = form.date.value || '';
        const time = form.time.value || '';
        const text = `Hello, I am ${name}. I would like to book a ${treatment} at the ${branchSelect.options[branchSelect.selectedIndex].text} branch on ${date} ${time}.`;
        const url = formatWhatsAppLink(number, text);
        window.open(url, '_blank');
      });

      emailReminder.addEventListener('change', () => {
        reminderOptions.style.display = emailReminder.checked ? 'block' : 'none';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageDiv.innerHTML = '';

        // Simple client-side validation
        const fullname = form.fullname.value.trim();
        const email = form.email.value.trim();
        const phone = form.phone.value.trim();
        const treatment = form.treatment.value;
        const branch = form.branch.value;
        const date = form.date.value;

        if (!fullname || !email || !phone || !treatment || !branch || !date) {
          showMessage('Please fill in all required fields.', 'error');
          return;
        }

        const payload = {
          fullname,
          email,
          phone,
          treatment,
          branch,
          date,
          time: form.time.value || null,
          notes: form.notes.value.trim() || null,
          emailReminder: emailReminder.checked,
          reminderTiming: emailReminder.checked ? document.getElementById('reminderTiming').value : null,
          submittedAt: new Date().toISOString()
        };

        // Disable button while sending
        submitBtn.disabled = true;

        try {
          // Change this endpoint to your real backend endpoint
          const res = await fetch('/api/bookings', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
          });

          if (res.ok) {
            showMessage('Booking request submitted successfully. We will contact you to confirm.', 'success');
            // Show WhatsApp quick link to contact branch if numbers configured
            const branchNumber = branchWhatsApp[branch];
            if (branchNumber) {
              const waText = `Hi, my name is ${fullname}. I submitted a booking request for ${treatment} on ${date} ${payload.time || ''}. Please confirm.`;
              const waLink = formatWhatsAppLink(branchNumber, waText);
              waInfo.innerHTML = `<div class="success">You can also message the branch on WhatsApp to follow up: <a href="${waLink}" target="_blank" rel="noopener">Send WhatsApp message</a></div>`;
            }

            // Reset form but keep branch selection so users can contact via WhatsApp if needed
            const selectedBranch = form.branch.value;
            form.reset();
            form.branch.value = selectedBranch;
            updateWhatsAppInfo();
          } else {
            const text = await res.text();
            showMessage('Failed to submit booking: ' + (text || res.statusText), 'error');
          }
        } catch (err) {
          showMessage('Network error: ' + err.message, 'error');
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>

  </div>
</body>
</html>
